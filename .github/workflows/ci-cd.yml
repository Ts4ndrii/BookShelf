# Workflow name
name: CI/CD Pipeline

# When to trigger the workflow
on:
  # Trigger on push to main and develop branches
  push:
    branches: 
      - main
      - develop
  # Trigger on pull request to main and develop branches
  pull_request:
    branches:
      - main
      - develop

# Define the jobs to run in the workflow
jobs:
  # Job name
  build-and-test:
    # Job description
    name: Build and Test
    # Specify the runner environment
    runs-on: ubuntu-latest

    # Define the steps to execute in the job
    steps:
      # Step 1: Checkout the code from the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Node.js environment
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      
      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm install

      # Step 4: Run linter to check code quality
      - name: Run linter
        run: npm run lint

      # Step 5: Run unit tests to ensure code correctness
      - name: Run unit tests
        run: npm run test:unit

      # Step 6: Build the application for production
      - name: Build for production
        run: npm run build

